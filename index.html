<!DOCTYPE html>
<html>
<head>
<title>Retro Tic Tac Toe</title>
<link rel="stylesheet" href="public/style.css">
<!-- PeerJS for online multiplayer -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>

<h1>RETRO TIC TAC TOE</h1>

<div id="menu">
<button id="botBtn">Play vs Bot</button>
<button id="pvpBtn">Play vs Player</button>
<button id="onlineBtn">Play Online</button>
</div>

<div id="roomInput" class="hidden">
<h2>Online Multiplayer</h2>
<p id="connectionStatus">Connecting...</p>
<div id="createJoinSection">
    <button id="createRoomBtn">Create Room</button>
    <p>OR</p>
    <input type="text" id="roomCode" placeholder="Enter room code">
    <button id="joinRoomBtn">Join Room</button>
</div>
</div>

<div id="waitingRoom" class="hidden">
<h2>Waiting for opponent...</h2>
<p>Share this code with your friend:</p>
<h3 id="roomCodeDisplay"></h3>
<button id="copyCodeBtn">Copy Code</button>
</div>

<div id="game" class="hidden">
<div id="status"></div>
<div id="board"></div>
<button id="restart">Play Again</button>
<button id="backToMenu">Main Menu</button>
</div>

<script src="public/game.js"></script>

</body>
</html>
